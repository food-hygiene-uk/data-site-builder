name: branch.yml - Verify the branch integrity

# Control concurrent executions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

# Define trigger events
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger

# Define minimum required permissions
permissions:
  contents: read

jobs:
  command-outputs:
    name: Set "outputs" from command execution
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      DENO_VERSION: ${{ steps.commands.outputs.DENO_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          sparse-checkout: |
            .deno-version
          sparse-checkout-cone-mode: false

      - name: Commands
        id: commands
        run: |
          echo "DENO_VERSION=$(cat .deno-version)" >> "$GITHUB_OUTPUT"

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    needs: [command-outputs]
    env:
      DENO_VERSION: ${{ needs.command-outputs.outputs.DENO_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Ensure SHA pinned actions
        uses: zgosalvez/github-actions-ensure-sha-pinned-actions@3db98c0363e2fa5df3e1c4c471777a7c10b24cc9 # v5.0.5

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run Deno test
        run: deno test --allow-read=tmp/ --allow-write=tmp/ .

      - name: Run Deno lint
        run: deno lint .

      - name: Run ESLint
        run: deno task eslint:check

      - name: Run Stylelint
        run: deno task stylelint:check

      - name: Run Prettier debug check
        run: deno task prettier:debug-check

      - name: Run formatter
        run: |
          deno task prettier:write ; status=$?
          if [ $status -eq 2 ]; then
            echo "Something’s wrong with Prettier."
            exit 2
          fi
          deno fmt
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Unformatted files detected. Please commit changes after running the formatter."
            exit 1
          fi

      - name: Run Deno check
        run: deno check .

      - name: Generate site
        run: deno task build
